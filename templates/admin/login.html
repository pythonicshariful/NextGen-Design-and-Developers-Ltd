<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin Login — NDDL</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/assets/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0d1117;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .login-wrap {
      width: 100%; max-width: 420px;
    }
    .login-brand {
      text-align: center; margin-bottom: 32px;
    }
    .login-brand .logo-circle {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; color: #fff;
      margin: 0 auto 14px;
    }
    .login-brand h1 { font-size: 22px; font-weight: 700; color: #e6edf3; }
    .login-brand p { font-size: 14px; color: #8b949e; margin-top: 4px; }

    .login-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 14px;
      padding: 32px;
    }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; color: #e6edf3; margin-bottom: 7px; }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      color: #8b949e; font-size: 14px;
    }
    .form-control {
      width: 100%; background: #21262d; border: 1px solid #30363d;
      border-radius: 8px; color: #e6edf3; font-size: 14px; font-family: inherit;
      padding: 11px 14px 11px 38px; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.2); }
    .form-control::placeholder { color: #8b949e; }

    .remember-row { display: flex; align-items: center; gap: 8px; margin-bottom: 22px; }
    .remember-row input[type=checkbox] { accent-color: #2563eb; width: 15px; height: 15px; }
    .remember-row label { font-size: 13px; color: #8b949e; cursor: pointer; }

    .btn-login {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: opacity .2s, transform .2s;
    }
    .btn-login:hover { opacity: .9; transform: translateY(-1px); }

    .alert {
      padding: 11px 14px; border-radius: 8px;
      font-size: 13px; font-weight: 500; margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
      border-left: 4px solid #da3633;
      background: rgba(218,54,51,.12); color: #ff7b72;
    }
    .login-footer { text-align: center; margin-top: 20px; font-size: 12px; color: #8b949e; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-brand">
    <div class="logo-circle"><i class="fas fa-building"></i></div>
    <h1>NDDL Admin</h1>
    <p>Sign in to manage your website</p>
  </div>
  <div class="login-card">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert"><i class="fas fa-exclamation-circle"></i> {{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-wrap">
          <i class="fas fa-user input-icon"></i>
          <input name="username" type="text" class="form-control" placeholder="Enter username" required autofocus/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input name="password" type="password" class="form-control" placeholder="Enter password" required/>
        </div>
      </div>
      <div class="remember-row">
        <input type="checkbox" name="remember" id="remember"/>
        <label for="remember">Keep me signed in</label>
      </div>
      <button type="submit" class="btn-login">Sign In <i class="fas fa-arrow-right"></i></button>
    </form>
  </div>
  <div class="login-footer">NextGen Design & Developers Ltd &copy; {{ 2024 }}</div>
</div>
</body>
</html>
